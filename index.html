/* PAGE */

/* CARDS */
.card{background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:18px 20px;transition:box-shadow .2s}

.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:8px}
.stat-box{background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:14px 10px;text-align:center}
.stat-val{font-size:24px;font-weight:900;letter-spacing:-1px;color:#1a1a1a}
.stat-lbl{font-size:12px;color:#666;margin-top:3px;font-weight:600}

/* CHIP */
.chip{background:#f5f5f5;border:1px solid #e8e8e8;border-radius:5px;padding:2px 9px;font-size:12px;font-weight:600;color:#666;display:inline-block}
.chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px}

/* EXP CARD */
.exp-card{border:1px solid #e8e8e8;border-radius:12px;background:#fff;overflow:hidden;margin-bottom:8px;transition:box-shadow .2s}
.exp-card:hover{box-shadow:0 2px 14px rgba(0,0,0,0.06)}

.exp-role{font-weight:800;font-size:16px;color:#1a1a1a;margin-bottom:2px}
.exp-org{font-size:14px;color:#666;margin-bottom:6px}
.exp-period{font-size:13px;color:#666;font-weight:600;white-space:nowrap}
.exp-arrow{font-size:14px;color:#aaa;transition:transform .2s;display:block}
.exp-arrow.open{transform:rotate(180deg)}
.exp-body{padding:0 18px 15px;border-top:1px solid #e8e8e8;display:none}
.exp-body.open{display:block}
.exp-body ul{margin:12px 0 0;padding-left:18px}
.exp-body li{font-size:15px;color:#666;line-height:1.7;margin-bottom:5px}
.exp-link{display:inline-block;margin-top:8px;font-size:13px;color:#666;font-weight:700;text-decoration:underline}

/* PRODUCT GRID */
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.product-card{background:#fff;border:1px solid #e8e8e8;border-radius:16px;overflow:hidden;display:flex;flex-direction:column;transition:box-shadow .2s}
.product-card:hover{box-shadow:0 4px 20px rgba(0,0,0,0.07)}
.product-preview{display:block;overflow:hidden;border-bottom:1px solid #e8e8e8;position:relative}
.product-preview img{width:100%;height:170px;object-fit:cover;object-position:top;display:block;transition:transform .35s}

.preview-badge{position:absolute;top:9px;right:9px;background:rgba(0,0,0,0.55);color:#fff;font-size:12px;font-weight:700;border-radius:6px;padding:3px 9px;backdrop-filter:blur(4px)}
.product-body{padding:16px 18px;display:flex;flex-direction:column;gap:10px;flex:1}
.product-emoji{font-size:22px;margin-bottom:3px}
.product-name{font-weight:900;font-size:17px;color:#1a1a1a}
.product-tag{font-size:13px;color:#666;font-weight:600}
.product-desc{font-size:14px;color:#666;line-height:1.75;margin:0}
.product-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:auto}
.pstat{background:#f5f5f5;border:1px solid #e8e8e8;border-radius:8px;padding:7px 5px;text-align:center}
.pstat-val{font-size:14px;font-weight:800;color:#1a1a1a}
.pstat-lbl{font-size:11px;color:#666;font-weight:600}

.prog-banner{background:#1a1a1a;border-radius:16px;padding:26px;margin-bottom:24px;color:#fff}
.prog-banner-tag{display:inline-block;background:rgba(255,255,255,0.1);border-radius:8px;padding:3px 10px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;color:rgba(255,255,255,0.55)}
.prog-banner h3{font-size:22px;font-weight:900;margin:0 0 8px;letter-spacing:-0.5px}
.prog-banner p{font-size:13px;color:rgba(255,255,255,0.6);margin:0 0 20px;line-height:1.6}
.prog-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.prog-stat{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:10px;padding:12px 8px;text-align:center}
.prog-stat-val{font-size:22px;font-weight:900;color:#fff}
.prog-stat-lbl{font-size:10px;font-weight:700;color:rgba(255,255,255,0.7);margin-top:3px}
.prog-stat-sub{font-size:9px;color:rgba(255,255,255,0.4);margin-top:2px;line-height:1.3}

.format-title{font-weight:800;font-size:13px;color:#1a1a1a;margin-bottom:3px}
.format-sub{font-size:11px;color:#666;margin-bottom:9px;font-weight:600}

.event-desc{font-size:13px;color:#666;line-height:1.75;margin:0 0 10px}

/* INFO NOTICE */

.notice-text{font-size:12px;color:#666;line-height:1.7;margin:0 0 10px}

/* FOOTER */
footer{text-align:center;padding:20px 0;color:#666;font-size:13px;border-top:1px solid #e8e8e8;font-weight:600}

@media(max-width:600px){
  .stat-grid,.prog-stats{grid-template-columns:repeat(2,1fr)}
  .nav-tabs{gap:1px}
  .nav-btn{padding:4px 8px;font-size:10px}
  nav{flex-wrap:wrap;height:auto;padding:8px 12px;gap:6px}
  .page{padding:100px 16px 40px}
}

// ── ROUTER ───────────────────────────────────────────────
const PAGES = {
  about: pageAbout
};

let currentPage = 'about';

function showPage(id){
  currentPage = id;
  // render page
  document.getElementById('app').innerHTML = `<div class="page active" id="pg-${id}">${PAGES[id]()}</div>`;
  // update nav
  document.querySelectorAll('.nav-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.page === id);
  });
  window.scrollTo(0,0);
}

function toggleExp(i){
  const body = document.getElementById('expb'+i);
  const arr  = document.getElementById('arr'+i);
  body.classList.toggle('open');
  arr.classList.toggle('open');
}

// ── INIT ─────────────────────────────────────────────────
(function init(){
  // build nav
  const tabs = document.getElementById('navTabs');
  NAV.forEach(n=>{
    const id = n.toLowerCase();
    const btn = document.createElement('button');
    btn.className = 'nav-btn';
    btn.dataset.page = id;
    btn.textContent = n;
    btn.onclick = ()=>showPage(id);
    tabs.appendChild(btn);
  });
  showPage('about');
})();
</script>
